services:
  web:
    image: php:8.2-apache
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html

  webhook:
    build:
      context: ./webhook
    ports:
      - "5000:5000"
    volumes:
      - .:/repo
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    restart: unless-stopped
